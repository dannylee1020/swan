name: Chrome Web Store Upload

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: chrome-web-store-upload
  cancel-in-progress: false

jobs:
  upload:
    name: Build and upload Chrome package
    runs-on: ubuntu-latest
    environment: chrome-web-store

    env:
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
      CWS_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
      CWS_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
      CWS_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
      WXT_SWAN_MANAGED_API_BASE_URL: ${{ vars.SWAN_MANAGED_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release version
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          node - "$version" <<'NODE'
          const version = process.argv[2];
          const parts = version.split(".");
          const valid =
            parts.length >= 1 &&
            parts.length <= 4 &&
            parts.every((part) => /^(0|[1-9]\d*)$/.test(part)) &&
            parts.every((part) => Number(part) >= 0 && Number(part) <= 65535) &&
            parts.some((part) => Number(part) !== 0);

          if (!valid) {
            console.error(`Invalid Chrome extension version: ${version}`);
            console.error("Use one to four dot-separated integers, e.g. 0.2.0.");
            process.exit(1);
          }
          NODE

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tag must point to a commit reachable from origin/main." >&2
            exit 1
          fi

          npm version "$version" --no-git-tag-version --allow-same-version
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "Release version: $version"

      - name: Verify release configuration
        run: |
          set -euo pipefail

          missing=0
          for name in CWS_EXTENSION_ID CWS_PUBLISHER_ID CWS_CLIENT_ID CWS_CLIENT_SECRET CWS_REFRESH_TOKEN WXT_SWAN_MANAGED_API_BASE_URL; do
            if [[ -z "${!name}" ]]; then
              echo "$name is not configured." >&2
              missing=1
            fi
          done
          exit "$missing"

      - name: Build Chrome Web Store package
        run: npm run build

      - name: Upload package for manual review
        run: |
          set -euo pipefail

          zip_path="output/swan-${RELEASE_VERSION}-chrome.zip"
          if [[ ! -f "$zip_path" ]]; then
            echo "Expected package not found: $zip_path" >&2
            exit 1
          fi

          token_response="$(curl -sS https://oauth2.googleapis.com/token \
            -d "client_secret=$CWS_CLIENT_SECRET" \
            -d "grant_type=refresh_token" \
            -d "refresh_token=$CWS_REFRESH_TOKEN" \
            -d "client_id=$CWS_CLIENT_ID")"

          access_token="$(node -e 'const data = JSON.parse(process.argv[1]); if (!data.access_token) { console.error(JSON.stringify(data)); process.exit(1); } process.stdout.write(data.access_token);' "$token_response")"
          echo "::add-mask::$access_token"

          upload_response="$(curl -sS \
            -H "Authorization: Bearer $access_token" \
            -X POST \
            -T "$zip_path" \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:upload")"

          node - "$upload_response" <<'NODE'
          const data = JSON.parse(process.argv[2]);
          const state = data.uploadState;
          if (state !== "SUCCESS" && state !== "UPLOAD_IN_PROGRESS") {
            console.error(JSON.stringify(data, null, 2));
            process.exit(1);
          }
          console.log(`Chrome Web Store upload state: ${state}`);
          console.log("Package uploaded. Submit it manually from the Chrome Web Store Developer Dashboard.");
          NODE
