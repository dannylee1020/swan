name: Chrome Web Store Upload

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

concurrency:
  group: chrome-web-store-upload
  cancel-in-progress: false

jobs:
  upload:
    name: Build and upload Chrome package
    runs-on: ubuntu-latest
    environment: chrome-web-store

    env:
      CWS_EXTENSION_ID: ${{ secrets.CWS_EXTENSION_ID }}
      CWS_PUBLISHER_ID: ${{ secrets.CWS_PUBLISHER_ID }}
      CWS_SERVICE_ACCOUNT_JSON: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
      WXT_SWAN_MANAGED_API_BASE_URL: ${{ vars.SWAN_MANAGED_API_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prepare release version
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          node - "$version" <<'NODE'
          const version = process.argv[2];
          const parts = version.split(".");
          const valid =
            parts.length >= 1 &&
            parts.length <= 4 &&
            parts.every((part) => /^(0|[1-9]\d*)$/.test(part)) &&
            parts.every((part) => Number(part) >= 0 && Number(part) <= 65535) &&
            parts.some((part) => Number(part) !== 0);

          if (!valid) {
            console.error(`Invalid Chrome extension version: ${version}`);
            console.error("Use one to four dot-separated integers, e.g. 0.2.0.");
            process.exit(1);
          }
          NODE

          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$GITHUB_SHA" origin/main; then
            echo "Release tag must point to a commit reachable from origin/main." >&2
            exit 1
          fi

          npm version "$version" --no-git-tag-version --allow-same-version
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"
          echo "Release version: $version"

      - name: Verify release configuration
        id: release-config
        run: |
          set -euo pipefail

          missing=0
          for name in CWS_EXTENSION_ID CWS_PUBLISHER_ID CWS_SERVICE_ACCOUNT_JSON; do
            if [[ -z "${!name}" ]]; then
              echo "$name is not configured." >&2
              missing=1
            fi
          done
          if [[ -z "$WXT_SWAN_MANAGED_API_BASE_URL" ]]; then
            echo "SWAN_MANAGED_API_BASE_URL is not configured on the chrome-web-store GitHub environment." >&2
            echo "This value is required because it is baked into the extension manifest host permissions." >&2
            missing=1
          fi
          if [[ "$missing" -ne 0 ]]; then
            exit "$missing"
          fi

          service_account_email="$(node -e 'const credentials = JSON.parse(process.env.CWS_SERVICE_ACCOUNT_JSON); if (!credentials.client_email) process.exit(1); process.stdout.write(credentials.client_email);')"
          echo "service_account_email=$service_account_email" >> "$GITHUB_OUTPUT"

      - name: Authenticate to Google
        id: google-auth
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.CWS_SERVICE_ACCOUNT_JSON }}
          service_account: ${{ steps.release-config.outputs.service_account_email }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/chromewebstore

      - name: Build Chrome Web Store package
        run: npm run build

      - name: Upload package for manual review
        env:
          CWS_ACCESS_TOKEN: ${{ steps.google-auth.outputs.access_token }}
        run: |
          set -euo pipefail

          zip_path="output/swan-${RELEASE_VERSION}-chrome.zip"
          if [[ ! -f "$zip_path" ]]; then
            echo "Expected package not found: $zip_path" >&2
            exit 1
          fi

          upload_response="$(curl -sS \
            -H "Authorization: Bearer $CWS_ACCESS_TOKEN" \
            -X POST \
            -T "$zip_path" \
            "https://chromewebstore.googleapis.com/upload/v2/publishers/${CWS_PUBLISHER_ID}/items/${CWS_EXTENSION_ID}:upload")"

          node - "$upload_response" <<'NODE'
          const data = JSON.parse(process.argv[2]);
          const state = data.uploadState;
          if (state !== "SUCCESS" && state !== "UPLOAD_IN_PROGRESS") {
            console.error(JSON.stringify(data, null, 2));
            process.exit(1);
          }
          console.log(`Chrome Web Store upload state: ${state}`);
          console.log("Package uploaded. Submit it manually from the Chrome Web Store Developer Dashboard.");
          NODE
