phoneNumber: "+15551234567"
cooldownMinutes: 10
monitoringEnabled: true
callEnabled: true

# SMS is optional. Voice calls only need the ElevenLabs values below; Twilio
# credentials here are used only when smsEnabled is true.
smsEnabled: false

elevenLabs:
  apiKey: "your-elevenlabs-api-key"
  agentId: "your-agent-id"
  agentPhoneNumberId: "phnum_your_phone_number_id"

# Optional direct SMS provider settings.
twilio:
  accountSid: "your-twilio-account-sid"
  apiKeySid: "your-twilio-api-key-sid"
  clientSecret: "your-twilio-client-secret"
  fromNumber: "+15551234567"

trackedDomains:
  - example.com
  - nsfw.com
